<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="static/css/main.css">
    <script src="static/js/visual.js"></script>
    <script src="static/js/utils.js"></script>
    <title>File Explorer</title>
</head>

<body>
    <div id="container">
        <div class="header">
            <button id="back-button" type="button" onclick="prevDir()">Back</button>
            <div id="current-directory">/</div>
        </div>

        <div id="column-headers">
            <span class="col-header col-header-name">Name</span>
            <span class="col-header col-header-size">Size</span>
        </div>

        <div id="file-list"></div>
    </div>

    <script>
        let BASE_PATH = "";
        fetch("/api/config")
            .then(r => r.json())
            .then(data => {
                BASE_PATH = data.base_path;
                loadDirectory(BASE_PATH);
            });
    </script>
</body>
</html>
