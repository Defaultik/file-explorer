<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="static/css/main.css">
    <script src="static/js/utils.js"></script>
    <script src="static/js/icon-map.js"></script>
    <script src="static/js/visual.js"></script>
    <title>File Explorer</title>
</head>

<body>
    <div id="container">
        <div class="header">
            <button id="back-button" type="button" onclick="prevDir()">
                <img src="assets/icons/back.png" alt="Back" />
            </button>
            <div id="current-directory">/</div>
            <button id="copy-button" type="button" onclick="copyCurrentPath()">
                <img src="assets/icons/copy.png" alt="Copy" />
            </button>
        </div>

        <div id="file-box">
            <div id="column-headers">
                <span class="col-header col-header-name">Name</span>
                <span class="col-header col-header-size">Size</span>
            </div>
            <div id="file-list"></div>
        </div>

        <div id="scroll-progress-track">
            <div id="scroll-progress-bar"></div>
        </div>
    </div>

    <script>
        function updateScrollProgress() {
            const box = document.getElementById('file-box');
            const track = document.getElementById('scroll-progress-track');
            const bar = document.getElementById('scroll-progress-bar');
            const scrollable = box.scrollHeight - box.clientHeight;

            if (scrollable <= 0) {
                track.style.opacity = '0';
                return;
            }

            track.style.opacity = '1';
            bar.style.width = (box.scrollTop / scrollable * 100) + '%';
        }

        document.getElementById('file-box').addEventListener('scroll', updateScrollProgress);
    </script>

    <script>
        let BASE_PATH = "";
        fetch("/api/config")
            .then(r => r.json())
            .then(data => {
                BASE_PATH = data.base_path;
                loadDirectory(BASE_PATH);
            });
    </script>
</body>
</html>
